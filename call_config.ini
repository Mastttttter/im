; 音视频通话参数配置
; 修改后重新启动程序生效

[audio]
; toxav_call/toxav_answer 音频码率（kbps）
bitrate_kbps=48

; 本地采样率（Hz）
sample_rate=48000

; 声道数（1=单声道, 2=双声道）
channels=1

; 每次从麦克风读取并发送的音频帧时长（ms）
frame_duration_ms=20

[video]
; toxav_call/toxav_answer 视频码率（kbps）
bitrate_kbps=5000

; 发送视频帧的目标 FPS（0=不节流，尽可能发送）
send_fps=15

; 发送前缩放到指定分辨率（0=使用摄像头原始帧尺寸）
target_width=0
target_height=0

; 缩放时是否保持宽高比（1=true, 0=false）
keep_aspect=1
